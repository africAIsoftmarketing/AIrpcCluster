name: Build Configurator

on:
  push:
    branches: [main]
    paths:
      - 'configurator/**'
      - '.github/workflows/build-configurator.yml'
  pull_request:
    branches: [main]
    paths:
      - 'configurator/**'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd configurator && npm install

      - name: Build macOS DMG
        run: cd configurator && npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: rpc-cluster-configurator-macos
          path: configurator/dist/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd configurator && npm install

      - name: Build Windows installer
        run: cd configurator && npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: rpc-cluster-configurator-windows
          path: configurator/dist/*.exe
          retention-days: 30
