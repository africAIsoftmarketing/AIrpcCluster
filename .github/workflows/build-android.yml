name: Build Android Worker APK

on:
  push:
    branches: [main]
    paths:
      - 'android-worker/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-worker/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          sdkmanager "ndk;26.3.11579264"
          sdkmanager "cmake;3.22.1"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-worker/**/*.gradle*', 'android-worker/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: android-worker/app/.cxx
          key: llamacpp-android-arm64-${{ hashFiles('android-worker/app/src/main/cpp/CMakeLists.txt') }}
          restore-keys: llamacpp-android-arm64-

      - name: Grant Gradle execute permission
        run: chmod +x android-worker/gradlew

      - name: Build release APK
        run: |
          cd android-worker
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=26.3.11579264 \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Sign APK (debug keystore for now)
        run: |
          cd android-worker
          ./gradlew assembleDebug --no-daemon
        # Debug build is self-signed automatically by Gradle.
        # For production: add KEYSTORE_FILE, KEYSTORE_PASSWORD,
        # KEY_ALIAS, KEY_PASSWORD as GitHub Secrets and use
        # signingConfigs in build.gradle.

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpc-cluster-worker-android
          path: |
            android-worker/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            android-worker/app/build/reports/
            android-worker/app/.cxx/
          retention-days: 7
